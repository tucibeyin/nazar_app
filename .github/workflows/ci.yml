name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Bağımlılıkları yükle
        run: pip install -r requirements-dev.txt

      - name: Tip kontrolü (mypy)
        run: mypy . --config-file mypy.ini

      - name: Güvenlik taraması (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Backend testleri + coverage (≥80%)
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=80

  # ─── Flutter Lint + Test ──────────────────────────────────────────────────────
  flutter-test:
    name: Flutter (Lint + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: Lint
        run: flutter analyze --fatal-infos

      - name: Unit testleri + coverage
        run: flutter test --coverage

      - name: Coverage eşiği (≥60%)
        run: |
          total=$(grep -E "^DA:" coverage/lcov.info | wc -l)
          covered=$(grep -E "^DA:[0-9]+,[^0]" coverage/lcov.info | wc -l)
          if [ "$total" -eq 0 ]; then echo "Coverage verisi yok" && exit 1; fi
          pct=$((covered * 100 / total))
          echo "Coverage: $covered/$total satır ($pct%)"
          [ "$pct" -ge 60 ] || (echo "✗ Coverage $pct% < %60 eşiği" && exit 1)

  # ─── iOS Build (only on main) ─────────────────────────────────────────────────
  ios-build:
    name: iOS Build
    needs: flutter-test
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: iOS release build
        run: flutter build ios --release --no-codesign

  # ─── Android Build (only on main) ────────────────────────────────────────────
  android-build:
    name: Android Build (AAB)
    needs: flutter-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: Android App Bundle build (Play Store formatı)
        run: flutter build appbundle --release
