# Nazar API — nginx site konfigürasyonu
#
# Kurulum:
#   cp infra/nginx.conf /etc/nginx/sites-available/nazar
#   ln -s /etc/nginx/sites-available/nazar /etc/nginx/sites-enabled/nazar
#   nginx -t && systemctl reload nginx

# ── DDoS / Kaba-kuvvet koruma (http context'te tanımlanır) ────────────────────
# Burst: anlık spike'lara izin verir; nodelay: kuyruğa almak yerine anında işler.
limit_req_zone  $binary_remote_addr zone=nazar_api:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=nazar_conn:10m;

upstream nazar_api {
    server 127.0.0.1:8014;
    keepalive 32;
}

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name nazar.aracabak.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name nazar.aracabak.com;

    # SSL — Let's Encrypt (certbot yönetimi)
    ssl_certificate     /etc/letsencrypt/live/nazar.aracabak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nazar.aracabak.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Açıkça TLS sürümleri — TLSv1.0/1.1 devre dışı
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # İstek büyüklüğü sınırı — API sadece küçük JSON döner, upload yok
    client_max_body_size 512k;

    # IP başına eşzamanlı bağlantı sınırı
    limit_conn nazar_conn 40;

    # Güvenlik başlıkları
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "no-referrer"                          always;
    add_header Permissions-Policy        "camera=(), microphone=()"             always;
    # API için minimal CSP: kaynak yükleme yasak, frame gömmesi yasak
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none';" always;

    # ── MP3 dosyaları: Python'u bypass et, nginx doğrudan servis eder ─────────
    # Bu sayede her ses isteği Gunicorn'u hiç meşgul etmez.
    location /media/ {
        alias   /var/www/nazar_app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Accept-Ranges bytes;
        access_log off;
        gzip       off;  # MP3 zaten sıkıştırılmış
    }

    # ── API: rate limit → Gunicorn upstream'e proxy ───────────────────────────
    location / {
        # IP başına saniyede 20 istek; 50'ye kadar burst'e izin ver
        limit_req zone=nazar_api burst=50 nodelay;

        proxy_pass         http://nazar_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_buffering   on;
        proxy_buffer_size 4k;
        proxy_buffers     8 8k;
    }
}
