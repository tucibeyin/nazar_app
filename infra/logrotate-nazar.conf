# Nazar App — Log rotation
#
# Kurulum:
#   cp infra/logrotate-nazar.conf /etc/logrotate.d/nazar
#
# Test:
#   logrotate -d /etc/logrotate.d/nazar

# nginx access/error logları
/var/log/nginx/access.log
/var/log/nginx/error.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}

# Gunicorn / uygulama logları (journald'ye yazıyor; ayrıca dosya varsa döndür)
/var/log/nazar/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 tucibeyin tucibeyin
    postrotate
        systemctl kill -s HUP nazar.service 2>/dev/null || true
    endscript
}
