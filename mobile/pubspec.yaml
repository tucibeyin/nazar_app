name: nazar_app
description: Nazar ve Ferahlama Uygulaması
publish_to: 'none'
version: 1.0.1+12

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  crypto: ^3.0.3
  http: ^1.2.1
  audioplayers: ^6.1.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.1
  google_fonts: ^6.2.1
  flutter_cache_manager: ^3.4.1
  audio_session: ^0.1.21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/nazar_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
